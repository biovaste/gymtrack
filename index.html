<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="GymTrack">
<meta name="theme-color" content="#0f1115">
<title>GymTrack</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" href="icon-180.png">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<header id="topbar">
  <div class="brand"><span class="brand-icon" data-icon="dumbbell"></span>GymTrack</div>
  <div class="topbar-right">
    <div id="session-chip" class="hidden"></div>
    <button id="settings-btn" class="icon-btn ghost" data-action="settings-open" aria-label="Settings" data-icon="gear"></button>
  </div>
</header>
<main id="app"></main>
<div id="stepper-bar" class="hidden"></div>
<div id="rest-banner" class="hidden"></div>
<nav id="tabbar">
  <button class="tab active" data-tab="workout"><span class="tab-icon" data-icon="dumbbell"></span><span>Workout</span></button>
  <button class="tab" data-tab="plan"><span class="tab-icon" data-icon="list"></span><span>Plan</span></button>
  <button class="tab" data-tab="history"><span class="tab-icon" data-icon="chart"></span><span>History</span></button>
  <button class="tab" data-tab="coach"><span class="tab-icon" data-icon="sparkle"></span><span>AI Coach</span></button>
</nav>
<div id="modal-root"></div>
<div id="picker-root"></div>
<div id="toast-root"></div>
<script src="app.js"></script>
</body>
</html>
